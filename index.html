<!DOCTYPE html>
<html>
<head>
  <style>
    /* CSS: Making it look good */
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    button { 
      padding: 10px 20px; 
      font-size: 18px; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
    }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <h1>My First Coding Project</h1>
  <p id="message">Click the button to see a magic trick.</p>
  <button onclick="changeText()">Click Me!</button>

  <script>
    // JavaScript: The Logic
    function changeText() {
      document.getElementById("message").innerHTML = "Hello! You just ran your first script! 🚀";
      document.getElementById("message").style.color = "green";
    }
  </script>

</body>
</html>
