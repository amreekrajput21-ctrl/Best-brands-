<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Brands Ramban</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: #000;
    }

    .logo {
      height: 50px;
      margin-right: 10px;
    }

    .hero {
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 400px;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .btn {
      background: red;
      padding: 10px 20px;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }

    .banner img {
      width: 100%;
    }

    .products {
      padding: 20px;
      text-align: center;
    }

    .product-grid {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .product-grid img {
      width: 150px;
      border-radius: 10px;
    }

    .contact {
      text-align: center;
      padding: 20px;
      background: #222;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #000;
    }
  </style>

</head>

<body>

<header class="header">
  <img src="logo.JPG" class="logo">
  <h1>Best Brands</h1>
</header>

<section class="hero">
  <img src="hero.JPG">
  <div class="overlay">
    <h2>Shop for Trending Outfits</h2>
    <p>Best Brands Ramban</p>
    <a href="tel:+919797475525" class="btn">Call Now</a>
  </div>
</section>

<section class="banner">
  <img src="banner.jpg">
</section>

<section class="products">
  <h2>Our Collection</h2>
  <div class="product-grid">
    <img src="models.JPG">
    <img src="product.JPG">
  </div>
</section>

<section class="contact">
  <h2>Contact Us</h2>
  <p>📞 +91 97974 75525</p>
  <p>📍 Ramban</p>
</section>

<footer>
  <p>© 2026 Best Brands Ramban</p>
</footer>

</body>
</html>
